<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahjong 麻將</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a1a2e; --bg2:#16213e; --card:#0f3460; --accent:#e94560;
  --gold:#f5c542; --green:#53a653; --tile-bg:#f0e6d3; --tile-border:#c4b59a;
  --text:#e8e8e8; --dim:#8e99a4; --panel:rgba(15,52,96,0.85);
  --border:rgba(255,255,255,0.08); --tw:48px; --th:64px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
button{font-family:inherit}

/* Buttons */
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-2px)}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(233,69,96,.3)}
.btn-s{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-g{background:linear-gradient(135deg,var(--gold),#c9a227);color:#1a1a2e}
.btn-gr{background:var(--green);color:#fff}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-lg{padding:16px 40px;font-size:18px}

.input{padding:12px 16px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:15px;outline:none}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--dim)}

/* ─── Menu ───────────────────── */
#menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse at 20% 50%,rgba(233,69,96,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(83,166,83,.08) 0%,transparent 50%),var(--bg)}
.title{font-size:60px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:18px;color:var(--dim);margin-bottom:48px;letter-spacing:2px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:600px;width:100%}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s}
.card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 32px rgba(233,69,96,.15)}
.card-icon{font-size:44px;margin-bottom:12px}
.card-title{font-size:20px;font-weight:700;margin-bottom:6px}
.card-desc{color:var(--dim);font-size:13px;line-height:1.5}

/* ─── Lobby ──────────────────── */
.screen{min-height:100vh;padding:20px}
.back{position:fixed;top:16px;left:16px;z-index:100;width:40px;height:40px;border-radius:50%;background:var(--panel);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
.back:hover{background:var(--accent)}
.lobby{max-width:460px;margin:56px auto 0}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px;backdrop-filter:blur(10px)}
.room-code{font-size:44px;font-weight:700;letter-spacing:10px;text-align:center;color:var(--gold);font-family:monospace;margin:12px 0}
.slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.slot{background:rgba(0,0,0,.2);border:1px dashed rgba(255,255,255,.15);border-radius:8px;padding:14px;text-align:center;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s}
.slot.on{border:1px solid var(--green);background:rgba(83,166,83,.1)}
.slot .wind{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim)}
.slot .name{font-weight:600;font-size:15px;margin-top:2px}

/* ─── Game ───────────────────── */
#game{background:radial-gradient(ellipse at center,rgba(22,33,62,1),var(--bg));min-height:100vh;display:flex;flex-direction:column}
.ghdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.badge{background:var(--card);padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600}
.turn-ind{color:var(--gold);font-weight:700;font-size:14px}
.table{flex:1;display:grid;grid-template-rows:auto 1fr auto;grid-template-columns:auto 1fr auto;padding:8px;gap:6px;max-width:1100px;margin:0 auto;width:100%}

.opp{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px}
.opp .oname{font-size:12px;font-weight:600;color:var(--dim)}
.opp .oname.act{color:var(--gold)}
.opp .otiles{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.opp .omelds{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.opp-t{grid-row:1;grid-column:2}
.opp-l{grid-row:2;grid-column:1}
.opp-l .otiles{flex-direction:column}
.opp-l .tb{width:34px!important;height:24px!important}
.opp-r{grid-row:2;grid-column:3}
.opp-r .otiles{flex-direction:column}
.opp-r .tb{width:34px!important;height:24px!important}

.tb{width:26px;height:34px;background:linear-gradient(135deg,#1a6b3c,#0d4a26);border:1px solid #2a8a4e;border-radius:3px;box-shadow:0 1px 2px rgba(0,0,0,.3);flex-shrink:0}

.center{grid-row:2;grid-column:2;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;background:rgba(0,60,30,.12);border-radius:14px;border:1px solid rgba(255,255,255,.04);padding:14px;position:relative}
.cinfo{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--dim);white-space:nowrap}
.dpool{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:380px}

.parea{grid-row:3;grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 0 6px}
.hand{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;min-height:var(--th)}
.pmelds{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.mgrp{display:flex;gap:3px;background:rgba(0,0,0,.2);padding:3px 5px;border-radius:5px}
.abar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:6px;min-height:44px}
.cbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:10px;background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.3);border-radius:8px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(233,69,96,.2)}50%{box-shadow:0 0 18px rgba(233,69,96,.4)}}

/* ─── Tiles ──────────────────── */
.tile{width:var(--tw);height:var(--th);background:linear-gradient(175deg,#faf5eb,#e8dcc8);border:1.5px solid var(--tile-border);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;box-shadow:0 2px 5px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.5);user-select:none;position:relative;flex-shrink:0}
.tile:hover{transform:translateY(-6px);box-shadow:0 6px 14px rgba(0,0,0,.3)}
.tile.sel{transform:translateY(-10px);border-color:var(--accent);box-shadow:0 8px 20px rgba(233,69,96,.3)}
.tile.drawn{border-color:var(--gold);box-shadow:0 2px 10px rgba(245,197,66,.4)}
.tile.dis{opacity:.5;cursor:default;pointer-events:none}
.tile .tr{font-size:20px;font-weight:700;line-height:1;color:#2d2d2d}
.tile .ts{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;color:#666}
.tile .tc{font-size:26px;line-height:1;color:#2d2d2d}
.tile.s-bam .tr{color:#2e7d32} .tile.s-cir .tr{color:#1565c0} .tile.s-chr .tr{color:#b71c1c}
.tile.t-wnd .tc{color:#6a1b9a} .tile.d-red .tc{color:#c62828} .tile.d-grn .tc{color:#2e7d32} .tile.d-wht .tc{color:#888}
.tile-m{width:30px;height:40px}
.tile-m .tr{font-size:14px} .tile-m .ts{font-size:7px} .tile-m .tc{font-size:17px}

/* ─── Toast ──────────────────── */
.toast{position:fixed;top:16px;right:16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 20px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideIn .3s;max-width:320px;font-size:14px}
.toast.err{border-color:var(--accent)}
@keyframes slideIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ─── Win Modal ──────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px;max-width:440px;width:90%;text-align:center}
.modal h2{color:var(--gold);margin-bottom:10px;font-size:24px}
.modal p{color:var(--dim);margin-bottom:16px}
.modal .whand{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin:14px 0}

@media(max-width:768px){
  :root{--tw:38px;--th:52px}
  .title{font-size:38px}
  .cards{grid-template-columns:1fr}
  .room-code{font-size:32px;letter-spacing:6px}
  .tile .tr{font-size:16px} .tile .tc{font-size:20px}
  .tb{width:20px;height:28px}
  .opp-l .tb,.opp-r .tb{width:28px!important;height:20px!important}
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="title">麻將 Mahjong</div>
  <div class="subtitle">Traditional 4-Player Game</div>
  <div class="cards">
    <div class="card" onclick="showLobby()">
      <div class="card-icon">🌐</div>
      <div class="card-title">Play Online</div>
      <div class="card-desc">Create a room and share the code with friends for real-time 4-player Mahjong.</div>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen hidden">
  <button class="back" onclick="show('menu')">←</button>
  <div class="lobby">
    <div class="panel" id="lob-join">
      <h2 style="text-align:center;margin-bottom:20px;color:var(--gold)">Play Online</h2>
      <div style="margin-bottom:16px">
        <label style="font-size:13px;color:var(--dim);display:block;margin-bottom:6px">Your Name</label>
        <input class="input" id="pname" placeholder="Enter your name" maxlength="20" style="width:100%">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <button class="btn btn-p" onclick="createRoom()">Create Room</button>
        <button class="btn btn-s" onclick="toggleJoin()">Join Room</button>
      </div>
      <div id="join-sec" class="hidden" style="padding-top:16px;border-top:1px solid var(--border)">
        <label style="font-size:13px;color:var(--dim);display:block;margin-bottom:6px">Room Code</label>
        <input class="input" id="code-in" placeholder="6-letter code" maxlength="6" style="width:100%;text-transform:uppercase;text-align:center;font-size:22px;letter-spacing:6px;margin-bottom:12px">
        <button class="btn btn-g" onclick="joinRoom()" style="width:100%">Join Game</button>
      </div>
    </div>
    <div class="panel hidden" id="lob-room">
      <div style="text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:3px;color:var(--dim)">Room Code</div>
      <div class="room-code" id="disp-code">------</div>
      <p style="text-align:center;color:var(--dim);font-size:12px;margin-bottom:16px">Share this code with your friends</p>
      <div class="slots" id="slots"></div>
      <button class="btn btn-g btn-lg hidden" id="start-btn" onclick="sendMsg({type:'start_game'})" style="width:100%">Start Game</button>
      <p id="wait-msg" style="text-align:center;color:var(--dim);font-size:12px;margin-top:8px">Waiting for players...</p>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen hidden">
  <div class="ghdr">
    <button class="btn btn-sm btn-s" onclick="leaveGame()">← Leave</button>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span class="badge" id="b-wind">East</span>
      <span class="badge" id="b-wall">Wall: 122</span>
      <span class="badge" id="b-turn">Turn: 0</span>
    </div>
    <div class="turn-ind" id="turn-ind">Your Turn</div>
  </div>
  <div class="table">
    <div class="opp opp-t" id="opp-t"><div class="oname" id="on-t">—</div><div class="otiles" id="ot-t"></div><div class="omelds" id="om-t"></div></div>
    <div class="opp opp-l" id="opp-l"><div class="oname" id="on-l">—</div><div class="otiles" id="ot-l"></div><div class="omelds" id="om-l"></div></div>
    <div class="center"><div class="cinfo" id="cinfo">Discards</div><div class="dpool" id="dpool"></div></div>
    <div class="opp opp-r" id="opp-r"><div class="oname" id="on-r">—</div><div class="otiles" id="ot-r"></div><div class="omelds" id="om-r"></div></div>
    <div class="parea">
      <div class="pmelds" id="pmelds"></div>
      <div class="hand" id="phand"></div>
      <div class="abar" id="abar"></div>
    </div>
  </div>
</div>

<!-- WIN MODAL -->
<div class="modal-bg hidden" id="winmod">
  <div class="modal">
    <h2 id="win-title">🎉 Winner!</h2>
    <p id="win-det"></p>
    <div class="whand" id="win-hand"></div>
    <button class="btn btn-p" onclick="el('winmod').classList.add('hidden')">OK</button>
  </div>
</div>

<script>
// ─── Globals ───────────────────────────────────────────────
let ws=null, GS=null, selTile=null, mySeat=-1, myId=null, claimOpts=null;

const el=id=>document.getElementById(id);
const WINDS=['East','South','West','North'];
const cap=s=>s?s[0].toUpperCase()+s.slice(1):s;

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));el(id).classList.remove('hidden')}
function showLobby(){show('lobby');el('lob-join').classList.remove('hidden');el('lob-room').classList.add('hidden')}
function toggleJoin(){el('join-sec').classList.toggle('hidden')}
function leaveGame(){show('menu');ws&&ws.close();ws=null;GS=null}

// ─── Toast ─────────────────────────────────────────────────
function toast(msg,err){
  const t=document.createElement('div');t.className='toast'+(err?' err':'');t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}

// ─── WebSocket ─────────────────────────────────────────────
function connectWS(){
  return new Promise(res=>{
    if(ws&&ws.readyState===WebSocket.OPEN)return res();
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(`${proto}//${location.host}`);
    ws.onopen=()=>res();
    ws.onmessage=e=>handleMsg(JSON.parse(e.data));
    ws.onclose=()=>{ws=null};
    ws.onerror=()=>{};
  });
}
function sendMsg(m){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(m))}

async function createRoom(){
  await connectWS();
  sendMsg({type:'create_room',name:el('pname').value.trim()||'Player'});
}
async function joinRoom(){
  const code=el('code-in').value.trim().toUpperCase();
  if(code.length!==6)return toast('Enter 6-letter code',true);
  await connectWS();
  sendMsg({type:'join_room',name:el('pname').value.trim()||'Player',code});
}

// ─── Message Handler ───────────────────────────────────────
function handleMsg(m){
  switch(m.type){
    case 'connected': myId=m.playerId; break;
    case 'room_created':
      mySeat=m.seat;
      el('lob-join').classList.add('hidden');el('lob-room').classList.remove('hidden');
      el('disp-code').textContent=m.code;
      updateSlots(m.players);
      break;
    case 'room_joined':
      mySeat=m.seat;
      el('lob-join').classList.add('hidden');el('lob-room').classList.remove('hidden');
      el('disp-code').textContent=m.code;
      break;
    case 'room_update': updateSlots(m.players); break;
    case 'room_full':
      if(mySeat===0){el('start-btn').classList.remove('hidden');el('wait-msg').textContent='All players joined!';}
      else el('wait-msg').textContent='Waiting for host to start...';
      break;
    case 'game_state': GS=m; show('game'); render(); break;
    case 'claim_available': showClaim(m.options,m.tile,m.fromSeat); break;
    case 'error': toast(m.message,true); break;
  }
}

function updateSlots(players){
  el('slots').innerHTML=players.map((p,i)=>`
    <div class="slot ${p.name?'on':''}">
      <div class="wind">${WINDS[i]}</div>
      <div class="name" ${!p.name?'style="color:var(--dim)"':''}>${p.name||'Waiting...'}</div>
    </div>`).join('');
}

// ─── Tile Rendering ────────────────────────────────────────
function tileHTML(t,mini,noclick){
  const cls=['tile'];
  if(mini)cls.push('tile-m');
  if(t.type==='suited'){
    cls.push({bamboo:'s-bam',circles:'s-cir',characters:'s-chr'}[t.suit]);
    const slab={bamboo:'BAM',circles:'CIR',characters:'CHR'}[t.suit];
    return `<div class="${cls.join(' ')}" data-id="${t.id}"><div class="tr">${t.rank}</div><div class="ts">${slab}</div></div>`;
  }
  if(t.type==='wind'){
    cls.push('t-wnd');
    const ch={east:'東',south:'南',west:'西',north:'北'}[t.name];
    return `<div class="${cls.join(' ')}" data-id="${t.id}"><div class="tc">${ch}</div><div class="ts">${cap(t.name)}</div></div>`;
  }
  if(t.type==='dragon'){
    cls.push('d-'+t.name.slice(0,3));
    const ch={red:'中',green:'發',white:'白'}[t.name];
    return `<div class="${cls.join(' ')}" data-id="${t.id}"><div class="tc">${ch}</div><div class="ts">${cap(t.name)}</div></div>`;
  }
  return '';
}

// ─── Game Rendering ────────────────────────────────────────
function render(){
  if(!GS)return;
  el('b-wind').textContent=cap(GS.roundWind);
  el('b-wall').textContent='Wall: '+GS.wallRemaining;
  el('b-turn').textContent='Turn: '+GS.turnCount;

  const my=GS.currentTurn===GS.seat;
  el('turn-ind').textContent=my
    ?(GS.turnPhase==='draw'?'🎯 Draw a Tile':'🎯 Discard a Tile')
    :`${GS.players[GS.currentTurn]?.name||'?'}'s Turn`;
  el('turn-ind').style.color=my?'var(--gold)':'var(--dim)';

  renderOpps();
  renderDiscards();
  renderHand();
  renderMelds();
  renderActions();

  if(GS.state==='finished')showWin();
}

function renderOpps(){
  const s=GS.seat;
  const across=(s+2)%4, left=(s+3)%4, right=(s+1)%4;
  renderOpp('t',across); renderOpp('l',left); renderOpp('r',right);
}
function renderOpp(pos,seat){
  const p=GS.players[seat];
  const act=seat===GS.currentTurn;
  el('on-'+pos).textContent=`${p.name||'?'} (${cap(p.seatWind)})`;
  el('on-'+pos).className='oname'+(act?' act':'');
  let h='';for(let i=0;i<p.handSize;i++)h+='<div class="tb"></div>';
  el('ot-'+pos).innerHTML=h;
  let ml='';
  for(const m of p.melds){
    ml+='<div class="mgrp">';
    for(const t of m.tiles)ml+=tileHTML(t,true);
    ml+='</div>';
  }
  el('om-'+pos).innerHTML=ml;
}

function renderDiscards(){
  let h='';
  for(const e of GS.allDiscards){
    let s=tileHTML(e.tile,true);
    if(GS.lastDiscard&&e.tile.id===GS.lastDiscard.id)
      s=s.replace('class="tile','class="tile" style="border:2px solid var(--accent);box-shadow:0 0 8px rgba(233,69,96,.3)"');
    h+=s;
  }
  el('dpool').innerHTML=h;
}

function renderHand(){
  const c=el('phand');c.innerHTML='';
  if(!GS.hand)return;

  GS.hand.forEach(tile=>{
    const div=document.createElement('div');
    div.innerHTML=tileHTML(tile);
    const tel=div.firstElementChild;

    if(GS.drawnTile&&tile.id===GS.drawnTile.id)tel.classList.add('drawn');
    if(selTile===tile.id)tel.classList.add('sel');

    tel.onclick=()=>tileClick(tile);

    // Drag to reorder
    tel.draggable=true;
    tel.ondragstart=e=>{e.dataTransfer.setData('text',tile.id);tel.style.opacity='.4'};
    tel.ondragend=()=>{tel.style.opacity='1'};
    tel.ondragover=e=>e.preventDefault();
    tel.ondrop=e=>{
      e.preventDefault();
      const fromId=+e.dataTransfer.getData('text');
      if(fromId===tile.id)return;
      const ids=GS.hand.map(t=>t.id);
      const fi=ids.indexOf(fromId),ti=ids.indexOf(tile.id);
      ids.splice(fi,1);ids.splice(ti,0,fromId);
      sendMsg({type:'reorder_hand',tileIds:ids});
    };

    c.appendChild(tel);
  });
}

function renderMelds(){
  let h='';
  for(const m of GS.melds){
    h+='<div class="mgrp">';
    for(const t of m.tiles)h+=tileHTML(t,true);
    h+='</div>';
  }
  el('pmelds').innerHTML=h;
}

function renderActions(){
  const bar=el('abar');bar.innerHTML='';
  if(GS.state!=='playing'||GS.currentTurn!==GS.seat)return;

  if(GS.turnPhase==='draw'){
    bar.innerHTML='<button class="btn btn-g" onclick="doDraw()">Draw Tile</button>';
  }
  // Claim bar handled separately via showClaim
}

function tileClick(tile){
  if(GS.state!=='playing')return;
  if(GS.currentTurn!==GS.seat)return;
  if(GS.turnPhase!=='discard')return;

  if(selTile===tile.id){
    // Confirm discard
    sendMsg({type:'discard',tileId:tile.id});
    selTile=null;
  } else {
    selTile=tile.id;
    renderHand();

    // Show context actions
    const bar=el('abar');bar.innerHTML='';
    bar.innerHTML+=`<button class="btn btn-p btn-sm" onclick="sendMsg({type:'discard',tileId:${tile.id}});selTile=null">Discard</button>`;

    // Check self-win
    if(GS.hand){
      // We can't check server-side from here, but we offer the button always during discard phase
      bar.innerHTML+=`<button class="btn btn-gr btn-sm" onclick="sendMsg({type:'declare_win'})">Declare Win (Tsumo)</button>`;
    }
  }
}

function doDraw(){sendMsg({type:'draw'})}

// ─── Claim UI ──────────────────────────────────────────────
function showClaim(options,tile,fromSeat){
  claimOpts=options;
  const bar=el('abar');
  let h='<div class="cbar">';
  h+=`<span style="font-size:13px;color:var(--accent)">Claim ${tile.type==='suited'?tile.rank+' '+cap(tile.suit):cap(tile.name||'')}?</span>`;

  if(options.includes('win'))h+=`<button class="btn btn-gr btn-sm" onclick="doClaim('win')">Win! 🎉</button>`;
  if(options.includes('kong'))h+=`<button class="btn btn-g btn-sm" onclick="doClaim('kong')">Kong</button>`;
  if(options.includes('pong'))h+=`<button class="btn btn-g btn-sm" onclick="doClaim('pong')">Pong</button>`;
  if(options.includes('chow'))h+=`<button class="btn btn-s btn-sm" onclick="showChowPicker()">Chow</button>`;
  h+=`<button class="btn btn-s btn-sm" onclick="sendMsg({type:'pass_claim'});el('abar').innerHTML=''">Pass</button>`;
  h+='</div>';
  bar.innerHTML=h;
}

function doClaim(type){
  sendMsg({type:'claim',claimType:type});
  el('abar').innerHTML='';
}

function showChowPicker(){
  // For simplicity, send chow with auto-detected ranks
  // The server will pick the first valid option
  const tile=GS.lastDiscard;
  if(!tile||tile.type!=='suited')return;
  const r=tile.rank,suit=tile.suit;
  const hrs=GS.hand.filter(t=>t.type==='suited'&&t.suit===suit).map(t=>t.rank);
  let ranks=null;
  if(hrs.includes(r-2)&&hrs.includes(r-1))ranks=[r-2,r-1,r];
  else if(hrs.includes(r-1)&&hrs.includes(r+1))ranks=[r-1,r,r+1];
  else if(hrs.includes(r+1)&&hrs.includes(r+2))ranks=[r,r+1,r+2];
  if(ranks){
    sendMsg({type:'claim',claimType:'chow',chowRanks:ranks});
    el('abar').innerHTML='';
  }
}

// ─── Win Modal ─────────────────────────────────────────────
function showWin(){
  const mod=el('winmod');
  if(GS.winner===-1){
    el('win-title').textContent='🤝 Draw!';
    el('win-det').textContent='The wall was exhausted — no winner this round.';
    el('win-hand').innerHTML='';
  } else {
    const p=GS.players[GS.winner];
    const isMe=GS.winner===GS.seat;
    el('win-title').textContent=isMe?'🎉 You Won!':'🀄 '+p.name+' Wins!';
    const sc=GS.winScore;
    el('win-det').textContent=sc?`${sc.name} — ${sc.points} point${sc.points>1?'s':''}`:'';
    // Show winner's hand if it's us
    if(isMe&&GS.hand){
      let h='';for(const t of GS.hand)h+=tileHTML(t,true);
      el('win-hand').innerHTML=h;
    } else el('win-hand').innerHTML='';
  }
  mod.classList.remove('hidden');
}
</script>
